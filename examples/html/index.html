<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>desktop-pet HTML Example</title>
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        background: #1d1d1d;
        color: #0f172a;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        display: grid;
        gap: 16px;
        justify-items: center;
      }

      h1 {
        margin: 0;
        font-size: 20px;
        font-weight: 700;
      }

    </style>
  </head>
  <body>
    <main>
      <h1>desktop-pet</h1>
      <desktop-pet
        id="desktop-pet"
        src="assets/cat_sprite.png"
        scale="0.5"
        animation-speed="1"
        movement-speed="0.5"
        direction="left"
        idle-row="0"
        walk-row="1"
        interactive
        follow-pointer
        hover-animation="sleep"
        click-animation="roll"
        position="right"
        edge-padding="20"
      ></desktop-pet>
    </main>

    <script type="module" src="/src/index.ts"></script>
    <script>
      const pet = document.querySelector('#desktop-pet')

      pet?.addEventListener('pet-hover-start', (event) => {
        console.log('pet-hover-start', event.detail)
      })

      pet?.addEventListener('pet-hover-end', (event) => {
        console.log('pet-hover-end', event.detail)
      })

      pet?.addEventListener('pet-click', (event) => {
        console.log('pet-click', event.detail)
      })
    </script>
  </body>
</html>
